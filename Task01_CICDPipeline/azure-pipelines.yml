# Azure CI/CD Pipeline
# Muhammad Hassan — CodeAlpha DevOps Internship Task 1

trigger:
  - main # Run pipeline when code is pushed to main branch

variables:
  # Your Azure Container Registry name
  acrName: "hassandevopsacr"
  acrLoginServer: "hassandevopsacr.azurecr.io"
  imageRepository: "webserver"
  imageTag: "$(Build.BuildId)"
  appServiceName: "hassan-devops-app"

stages:
  # ─────────────────────────────────────
  # STAGE 1: BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────
  - stage: Build
    displayName: "Build and Push Docker Image"
    jobs:
      - job: BuildJob
        displayName: "Build Docker Image"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          # Step 1: Login to Azure Container Registry
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: "hassandevopsacr"

          # Step 2: Build the Docker image
          - task: Docker@2
            displayName: "Build Docker Image"
            inputs:
              command: build
              repository: $(acrLoginServer)/$(imageRepository)
              dockerfile: "Dockerfile"
              tags: $(imageTag)

          # Step 3: Push image to Azure Container Registry
          - task: Docker@2
            displayName: "Push Docker Image to ACR"
            inputs:
              command: push
              repository: $(acrLoginServer)/$(imageRepository)
              tags: $(imageTag)

  # ─────────────────────────────────────
  # STAGE 2: DEPLOY TO AZURE APP SERVICE
  # ─────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Azure App Service"
    dependsOn: Build
    jobs:
      - job: DeployJob
        displayName: "Deploy Web App"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          # Deploy container to App Service
          - task: AzureWebAppContainer@1
            displayName: "Deploy to App Service"
            inputs:
              azureSubscription: "hassan-azure-connection"
              appName: $(appServiceName)
              containers: $(acrLoginServer)/$(imageRepository):$(imageTag)
