<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Task 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            max-width: 700px;
        }

        .badge {
            background: #e94560;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1em;
            color: #aaa;
            margin-bottom: 35px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.07);
            padding: 18px;
            border-radius: 12px;
            border-left: 3px solid #00d2ff;
        }

        .info-card .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-card .value {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 100, 0.1);
            border: 1px solid rgba(0, 255, 100, 0.3);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 15px;
            color: #00ff64;
            margin-bottom: 30px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #00ff64;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(1.3);
            }
        }

        .footer {
            font-size: 13px;
            color: #666;
            margin-top: 20px;
        }

        .footer span {
            color: #e94560;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="badge">🐳 Docker Container</div>
        <h1>Web Server Live!</h1>
        <p class="subtitle">CodeAlpha DevOps Internship — Task 4</p>

        <div class="status">
            <div class="dot"></div>
            Container is Running
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="label">Web Server</div>
                <div class="value">Nginx</div>
            </div>
            <div class="info-card">
                <div class="label">Container</div>
                <div class="value">Docker</div>
            </div>
            <div class="info-card">
                <div class="label">Task</div>
                <div class="value">Task 4 — Web Server</div>
            </div>
            <div class="info-card">
                <div class="label">Intern</div>
                <div class="value">Muhammad Hassan</div>
            </div>
        </div>

        <div class="footer">
            Deployed with Docker &nbsp;|&nbsp;
            <span>CodeAlpha</span> DevOps Internship
        </div>
    </div>
</body>

</html>
