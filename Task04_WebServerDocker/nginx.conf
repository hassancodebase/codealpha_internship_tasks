server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Custom error pages
    error_page 404 /index.html;

    # Health check endpoint
    location /health {
        return 200 'OK - Container is healthy!';
        add_header Content-Type text/plain;
    }
}